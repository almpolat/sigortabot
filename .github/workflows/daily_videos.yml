name: Daily Video Generation

on:
  schedule:
    # Her gün TSİ 09:00'da çalıştır (06:00 UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      n:
        description: "Üretilecek video sayısı"
        required: false
        default: "5"
        type: string
      kategori:
        description: "Kategori filtresi (boş = hepsi)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (video üretme)"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"

jobs:
  generate-videos:
    name: Komik Sigorta Videoları Üret
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: .env oluştur
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env

      - name: Pipeline'ı çalıştır
        run: |
          python -m src.main run \
            --n "${{ github.event.inputs.n || '5' }}" \
            ${{ github.event.inputs.kategori && format('--kategori {0}', github.event.inputs.kategori) || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Run raporunu ve scriptleri yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sigortabot-run-${{ github.run_number }}
          path: |
            output/last_run_report.json
            scripts/
          retention-days: 30

      - name: Üretilen videoları yükle
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sigortabot-videos-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 7
